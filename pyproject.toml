[tool.ruff]
target-version = "py314"
line-length = 88

exclude = [
  ".git",
  ".turbo",
  ".venv",
  "node_modules",
  "dist",
  "build",
  "coverage",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "W",
  "I",
  "N",
  "UP",
  "B",
  "C4",
  "SIM",
  "ARG",
  "RET",
  "PTH",
  "A",
  "RUF",
]

ignore = [
  "D",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
skip-magic-trailing-comma = false
