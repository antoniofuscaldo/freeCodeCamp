version: 2
updates:
  # Minor e patch: automerge possibile se le regole di branch protection sono soddisfatte
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      time: '06:00'
      timezone: 'Europe/Rome'
    update-types:
      - 'version-update:semver-minor'
      - 'version-update:semver-patch'
    open-pull-requests-limit: 5
    rebase-strategy: 'auto'
    versioning-strategy: 'increase'
    commit-message:
      prefix: 'chore(deps):'
    labels:
      - 'dependencies'
      - 'dependabot'
      - 'minor-or-patch'
    automerged_updates:
      enabled: true
      merge_method: 'squash'

  # Major: apri PR separate, gestione manuale
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      time: '06:00'
      timezone: 'Europe/Rome'
    update-types:
      - 'version-update:semver-major'
    open-pull-requests-limit: 2
    rebase-strategy: 'auto'
    versioning-strategy: 'increase'
    commit-message:
      prefix: 'chore(deps):'
    labels:
      - 'dependencies'
      - 'dependabot'
      - 'major'
