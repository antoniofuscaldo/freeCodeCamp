version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "Europe/Rome"
    update-types:
      - "version-update:semver-minor"
      - "version-update:semver-patch"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "dependabot"
      - "minor-or-patch"
